<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>

    <link rel="stylesheet" href="css/cadastro.css">
</head>

<body>

<div class="container">

    <header>

        <div class="logo">

            <img src="img/img_logo.png" alt="Logo">

            <div>

                <h1>Biblioteca Agatt</h1>

                <p>Biblioteca infantil do parque</p>

            </div>

        </div>

    </header>

    <nav class="menu">
    <ul>
        <li><a href="index.html">Página Principal</a></li>
    </ul>
    </nav>

    <section class="banner">

        <img src="img/img_cabeçalho.png" alt="Banner">

    </section>
<section class="conteudo">

    <div class="cadastro">

        <h2>Cadastro para Empréstimo</h2>

        <form>

            <label>Nome:</label><br>
            <input type="text"><br><br>

            <label>CPF:</label><br>
            <input type="text"><br><br>

            <label>Endereço:</label><br>
            <input type="text"><br><br>

            <label>Telefone:</label><br>
            <input type="text"><br><br>

            <label>E-mail:</label><br>
            <input type="email"><br><br>

            <button>Enviar</button>

        </form>

    </div>

    <div class="comentario">

        <h2>Comentários</h2>

        <form>

            <label>Nome:</label><br>
            <input type="text"><br><br>

            <label>Comentário:</label><br>

            <textarea rows="8" cols="30"></textarea>

            <br><br>

            <button>Enviar</button>

        </form>

    </div>

</section>

<footer>
<div class="rodape">

            <a href="contato.html">Endereço</a> |

            <a href="contato.html">Contato</a>

        </div>

        <img src="img/rodape.png" alt="Rodapé">
</footer>

</body>
</html>
